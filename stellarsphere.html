<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar System Simulation</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    overflow: hidden;
    font-family: 'Share Tech Mono', monospace;
    color: #fff;
  }

  #canvas-container { width: 100vw; height: 100vh; }

  #ui {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  #title {
    position: absolute;
    top: 24px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(14px, 2.5vw, 22px);
    font-weight: 900;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #fff;
    text-shadow: 0 0 20px rgba(100,180,255,0.8), 0 0 40px rgba(100,180,255,0.4);
  }

  #controls {
    position: absolute;
    bottom: 28px; left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 20px;
    align-items: center;
    pointer-events: all;
    background: rgba(0,10,30,0.7);
    border: 1px solid rgba(100,180,255,0.2);
    padding: 12px 24px;
    border-radius: 40px;
    backdrop-filter: blur(10px);
  }

  #controls label {
    font-size: 11px;
    letter-spacing: 0.1em;
    color: rgba(150,200,255,0.8);
    text-transform: uppercase;
  }

  #speed-slider {
    -webkit-appearance: none;
    width: 130px;
    height: 3px;
    background: linear-gradient(to right, #1a4a8a, #4ab0ff);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  #speed-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #4ab0ff;
    box-shadow: 0 0 8px #4ab0ff;
    cursor: pointer;
  }

  .ctrl-btn {
    background: rgba(100,180,255,0.1);
    border: 1px solid rgba(100,180,255,0.3);
    color: rgba(180,220,255,0.9);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    pointer-events: all;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .ctrl-btn:hover {
    background: rgba(100,180,255,0.25);
    border-color: rgba(100,180,255,0.6);
    box-shadow: 0 0 12px rgba(100,180,255,0.3);
  }

  #planet-info {
    position: absolute;
    top: 80px; right: 28px;
    width: 220px;
    background: rgba(0,8,25,0.85);
    border: 1px solid rgba(100,180,255,0.25);
    border-radius: 12px;
    padding: 18px;
    backdrop-filter: blur(12px);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }
  #planet-info.visible { opacity: 1; }

  #planet-info h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.15em;
    margin-bottom: 12px;
    color: #7dcfff;
    text-shadow: 0 0 10px rgba(125,207,255,0.5);
  }

  .info-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    margin-bottom: 7px;
    padding-bottom: 7px;
    border-bottom: 1px solid rgba(100,180,255,0.08);
  }
  .info-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .info-label { color: rgba(130,180,255,0.6); }
  .info-val { color: rgba(220,240,255,0.9); }

  #hint {
    position: absolute;
    bottom: 90px; left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    letter-spacing: 0.12em;
    color: rgba(100,150,200,0.5);
    text-transform: uppercase;
    white-space: nowrap;
  }

  #legend {
    position: absolute;
    top: 80px; left: 28px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: rgba(150,200,255,0.6);
    cursor: pointer;
    pointer-events: all;
    transition: color 0.2s;
    text-transform: uppercase;
  }
  .legend-item:hover { color: rgba(200,230,255,0.9); }

  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  #asteroid-counter {
    position: absolute;
    top: 24px; right: 28px;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: rgba(100,150,200,0.5);
    text-transform: uppercase;
    text-align: right;
    line-height: 1.6;
  }
</style>
</head>
<body>
<div id="canvas-container"></div>
<div id="ui">
  <div id="title">☀ Solar System Simulation</div>

  <div id="asteroid-counter">
    PLANETARY DEFENSE MODE<br>
    <span id="asteroid-count" style="color:rgba(255,180,80,0.7)">TRACKING: 0 OBJECTS</span>
  </div>

  <div id="legend"></div>

  <div id="planet-info">
    <h2 id="info-name">PLANET</h2>
    <div class="info-row"><span class="info-label">TYPE</span><span class="info-val" id="info-type"></span></div>
    <div class="info-row"><span class="info-label">DIAMETER</span><span class="info-val" id="info-diam"></span></div>
    <div class="info-row"><span class="info-label">ORBIT</span><span class="info-val" id="info-orbit"></span></div>
    <div class="info-row"><span class="info-label">MOONS</span><span class="info-val" id="info-moons"></span></div>
    <div class="info-row"><span class="info-label">TEMP</span><span class="info-val" id="info-temp"></span></div>
    <div class="info-row" id="info-fact-row"><span class="info-label">FACT</span><span class="info-val" id="info-fact" style="font-size:10px;text-align:right;max-width:130px"></span></div>
  </div>

  <div id="controls">
    <label>SPEED</label>
    <input type="range" id="speed-slider" min="0" max="5" step="0.1" value="1">
    <button class="ctrl-btn" id="pause-btn">PAUSE</button>
    <button class="ctrl-btn" id="orbits-btn">ORBITS OFF</button>
    <button class="ctrl-btn" id="asteroid-btn">ASTEROIDS</button>
  </div>

  <div id="hint">DRAG TO ROTATE · SCROLL TO ZOOM · HOVER PLANETS</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const PLANETS = [
  { name:'Mercury', color:0x9E9E9E, size:0.38, orbit:5.8,  speed:4.74,  tilt:0.03, moons:0,  type:'Terrestrial', diam:'4,879 km',   temp:'-180 / 430°C', fact:'Smallest planet' },
  { name:'Venus',   color:0xE8C77A, size:0.95, orbit:8.0,  speed:3.50,  tilt:177,  moons:0,  type:'Terrestrial', diam:'12,104 km',  temp:'465°C avg',    fact:'Hottest planet' },
  { name:'Earth',   color:0x4B9CD3, size:1.0,  orbit:11.0, speed:2.98,  tilt:23.5, moons:1,  type:'Terrestrial', diam:'12,742 km',  temp:'-88 / 58°C',   fact:'Only known life' },
  { name:'Mars',    color:0xC1440E, size:0.53, orbit:15.0, speed:2.41,  tilt:25.2, moons:2,  type:'Terrestrial', diam:'6,779 km',   temp:'-153 / 20°C',  fact:'Has largest volcano' },
  { name:'Jupiter', color:0xC88B3A, size:3.5,  orbit:24.0, speed:1.31,  tilt:3.1,  moons:95, type:'Gas Giant',   diam:'139,820 km', temp:'-145°C cloud', fact:'Biggest planet' },
  { name:'Saturn',  color:0xE4D191, size:2.9,  orbit:34.0, speed:0.97,  tilt:26.7, moons:146,type:'Gas Giant',   diam:'116,460 km', temp:'-178°C avg',   fact:'Least dense planet' },
  { name:'Uranus',  color:0x7FFFD4, size:1.8,  orbit:44.0, speed:0.68,  tilt:97.8, moons:27, type:'Ice Giant',   diam:'50,724 km',  temp:'-224°C avg',   fact:'Rotates on its side' },
  { name:'Neptune', color:0x4169E1, size:1.7,  orbit:54.0, speed:0.54,  tilt:28.3, moons:16, type:'Ice Giant',   diam:'49,244 km',  temp:'-218°C avg',   fact:'Strongest winds' },
];

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 3000);
camera.position.set(0, 40, 90);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
document.getElementById('canvas-container').appendChild(renderer.domElement);

// Lighting
const ambientLight = new THREE.AmbientLight(0x111133, 1.2);
scene.add(ambientLight);
const sunLight = new THREE.PointLight(0xFFF4E0, 3.5, 500);
scene.add(sunLight);

// Stars
function createStarField() {
  const geo = new THREE.BufferGeometry();
  const count = 8000;
  const pos = new Float32Array(count * 3);
  const sizes = new Float32Array(count);
  for (let i = 0; i < count; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = 500 + Math.random() * 800;
    pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    pos[i*3+2] = r * Math.cos(phi);
    sizes[i] = Math.random() * 2.5 + 0.3;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
  const mat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.6, sizeAttenuation: true, transparent: true, opacity: 0.9 });
  return new THREE.Points(geo, mat);
}
scene.add(createStarField());

// Sun
function createSunTexture() {
  const c = document.createElement('canvas');
  c.width = c.height = 512;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(256,256,0,256,256,256);
  g.addColorStop(0, '#fff8e0');
  g.addColorStop(0.2, '#ffe566');
  g.addColorStop(0.5, '#ff8c00');
  g.addColorStop(0.8, '#ff4500');
  g.addColorStop(1, '#c22000');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,512,512);
  // noise
  for(let i=0;i<800;i++){
    const x=Math.random()*512, y=Math.random()*512;
    const r=Math.random()*15+2;
    const lg=ctx.createRadialGradient(x,y,0,x,y,r);
    lg.addColorStop(0,'rgba(255,255,200,0.3)');
    lg.addColorStop(1,'rgba(255,100,0,0)');
    ctx.fillStyle=lg; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  }
  return new THREE.CanvasTexture(c);
}

const sunGeo = new THREE.SphereGeometry(3.5, 64, 64);
const sunMat = new THREE.MeshBasicMaterial({ map: createSunTexture() });
const sun = new THREE.Mesh(sunGeo, sunMat);
scene.add(sun);

// Sun glow
function addSunGlow() {
  [6.5, 8.5, 12].forEach((r, i) => {
    const g = new THREE.SphereGeometry(r, 32, 32);
    const opacity = [0.15, 0.07, 0.03][i];
    const color = [0xFFD700, 0xFF8C00, 0xFF4500][i];
    const m = new THREE.MeshBasicMaterial({ color, transparent: true, opacity, side: THREE.BackSide });
    scene.add(new THREE.Mesh(g, m));
  });
}
addSunGlow();

// Planet texture
function makePlanetTexture(color, isGas=false) {
  const c = document.createElement('canvas');
  c.width = c.height = 256;
  const ctx = c.getContext('2d');
  const r = parseInt(color / 65536) & 0xff;
  const g = parseInt(color / 256) & 0xff;
  const b = color & 0xff;
  const base = `rgb(${r},${g},${b})`;
  ctx.fillStyle = base; ctx.fillRect(0,0,256,256);
  if (isGas) {
    for (let band=0; band<12; band++) {
      const y = (band/12)*256;
      const bw = 256/12;
      const alpha = Math.random()*0.2+0.05;
      const br = Math.min(255,r+Math.floor(Math.random()*60-30));
      const bg = Math.min(255,g+Math.floor(Math.random()*60-30));
      const bb = Math.min(255,b+Math.floor(Math.random()*60-30));
      ctx.fillStyle = `rgba(${br},${bg},${bb},${alpha})`;
      ctx.fillRect(0, y, 256, bw);
    }
  } else {
    for(let i=0;i<200;i++){
      const x=Math.random()*256, y2=Math.random()*256;
      const sz=Math.random()*8+1;
      const dr=Math.floor(Math.random()*40-20);
      const dg=Math.floor(Math.random()*40-20);
      const db=Math.floor(Math.random()*40-20);
      ctx.fillStyle=`rgba(${Math.min(255,r+dr)},${Math.min(255,g+dg)},${Math.min(255,b+db)},0.3)`;
      ctx.beginPath(); ctx.arc(x,y2,sz,0,Math.PI*2); ctx.fill();
    }
  }
  return new THREE.CanvasTexture(c);
}

// Earth texture
function makeEarthTexture() {
  const c = document.createElement('canvas');
  c.width = c.height = 512;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#1a5a8a'; ctx.fillRect(0,0,512,512);
  const continents = [
    {x:180,y:180,w:100,h:80},{x:240,y:160,w:60,h:50},{x:120,y:260,w:80,h:60},
    {x:280,y:220,w:70,h:90},{x:350,y:150,w:50,h:70},{x:100,y:180,w:40,h:30},
    {x:400,y:270,w:55,h:40},{x:160,y:320,w:65,h:50}
  ];
  ctx.fillStyle = '#4a8a3a';
  continents.forEach(cont => {
    ctx.beginPath();
    ctx.ellipse(cont.x, cont.y, cont.w, cont.h, Math.random()*0.5, 0, Math.PI*2);
    ctx.fill();
  });
  // ice caps
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.beginPath(); ctx.ellipse(256,20,200,30,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(256,490,180,25,0,0,Math.PI*2); ctx.fill();
  return new THREE.CanvasTexture(c);
}

const planetMeshes = [];
const orbitLines = [];
let showOrbits = true;

PLANETS.forEach((pd, i) => {
  const isGas = pd.type === 'Gas Giant';
  const isIce = pd.type === 'Ice Giant';
  const tex = pd.name === 'Earth' ? makeEarthTexture() : makePlanetTexture(pd.color, isGas || isIce);
  const geo = new THREE.SphereGeometry(pd.size * 0.9, 48, 48);
  const mat = new THREE.MeshPhongMaterial({ map: tex, shininess: isGas ? 5 : 15 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.userData = { ...pd, angle: Math.random() * Math.PI * 2, index: i };
  scene.add(mesh);
  planetMeshes.push(mesh);

  // Orbit ring
  const oGeo = new THREE.RingGeometry(pd.orbit - 0.05, pd.orbit + 0.05, 128);
  const oMat = new THREE.MeshBasicMaterial({ color: 0x334466, transparent: true, opacity: 0.35, side: THREE.DoubleSide });
  const ring = new THREE.Mesh(oGeo, oMat);
  ring.rotation.x = -Math.PI / 2;
  scene.add(ring);
  orbitLines.push(ring);

  // Saturn rings
  if (pd.name === 'Saturn') {
    const rGeo = new THREE.RingGeometry(pd.size * 1.4, pd.size * 2.4, 80);
    const rMat = new THREE.MeshBasicMaterial({ color: 0xC8B560, transparent: true, opacity: 0.65, side: THREE.DoubleSide });
    const ringMesh = new THREE.Mesh(rGeo, rMat);
    ringMesh.rotation.x = -Math.PI / 3;
    mesh.add(ringMesh);
    // second ring
    const rGeo2 = new THREE.RingGeometry(pd.size * 1.3, pd.size * 1.38, 80);
    const rMat2 = new THREE.MeshBasicMaterial({ color: 0xA09050, transparent: true, opacity: 0.4, side: THREE.DoubleSide });
    mesh.add(new THREE.Mesh(rGeo2, rMat2));
  }

  // Earth's moon
  if (pd.name === 'Earth') {
    const mGeo = new THREE.SphereGeometry(0.25, 20, 20);
    const mMat = new THREE.MeshPhongMaterial({ color: 0xaaaaaa });
    const moon = new THREE.Mesh(mGeo, mMat);
    moon.userData = { isMoon: true, angle: 0, orbitR: 1.8 };
    mesh.add(moon);
  }
  // Jupiter's moons (4 Galilean)
  if (pd.name === 'Jupiter') {
    [0.18, 0.22, 0.26, 0.2].forEach((ms, mi) => {
      const mGeo = new THREE.SphereGeometry(ms, 12, 12);
      const colors = [0xd4a860, 0xc89060, 0xa0a0a0, 0xe0c080];
      const mMat = new THREE.MeshPhongMaterial({ color: colors[mi] });
      const moon = new THREE.Mesh(mGeo, mMat);
      moon.userData = { isMoon: true, angle: mi * 1.5, orbitR: pd.size * 1.6 + mi * 0.7, speed: 2 + mi * 0.5 };
      mesh.add(moon);
    });
  }
});

// Legend
const legend = document.getElementById('legend');
PLANETS.forEach(pd => {
  const div = document.createElement('div');
  div.className = 'legend-item';
  div.innerHTML = `<div class="legend-dot" style="background:#${pd.color.toString(16).padStart(6,'0')}"></div>${pd.name}`;
  div.addEventListener('click', () => focusPlanet(pd.name));
  legend.appendChild(div);
});

// Asteroids
const asteroids = [];
let showAsteroids = false;
const asteroidGroup = new THREE.Group();
scene.add(asteroidGroup);

function createAsteroid() {
  const geo = new THREE.SphereGeometry(Math.random()*0.12+0.04, 6, 6);
  const mat = new THREE.MeshPhongMaterial({ color: 0x888877 });
  const mesh = new THREE.Mesh(geo, mat);
  const orbitR = 18 + Math.random() * 5;
  const angle = Math.random() * Math.PI * 2;
  const tilt = (Math.random()-0.5) * 0.4;
  mesh.userData = { orbitR, angle, speed: 0.5 + Math.random()*1.5, tilt };
  asteroidGroup.add(mesh);
  asteroids.push(mesh);
}
for(let i=0; i<280; i++) createAsteroid();
asteroidGroup.visible = false;

document.getElementById('asteroid-btn').addEventListener('click', () => {
  showAsteroids = !showAsteroids;
  asteroidGroup.visible = showAsteroids;
  document.getElementById('asteroid-btn').textContent = showAsteroids ? 'HIDE BELT' : 'ASTEROIDS';
  document.getElementById('asteroid-count').textContent = showAsteroids ? `TRACKING: ${asteroids.length} OBJECTS` : 'TRACKING: 0 OBJECTS';
});

// Orbit controls (manual)
let isDragging = false, lastMouse = {x:0,y:0};
let spherical = { theta: 0.3, phi: Math.PI/3.5, r: 90 };
let targetSpherical = { ...spherical };
let paused = false;
let speedMult = 1;

renderer.domElement.addEventListener('mousedown', e => { isDragging = true; lastMouse = {x:e.clientX, y:e.clientY}; });
renderer.domElement.addEventListener('mouseup', () => isDragging = false);
renderer.domElement.addEventListener('mousemove', e => {
  if (isDragging) {
    const dx = e.clientX - lastMouse.x;
    const dy = e.clientY - lastMouse.y;
    targetSpherical.theta -= dx * 0.006;
    targetSpherical.phi = Math.max(0.15, Math.min(Math.PI/2.1, targetSpherical.phi + dy * 0.006));
    lastMouse = {x:e.clientX, y:e.clientY};
  }
  checkHover(e);
});
renderer.domElement.addEventListener('wheel', e => {
  targetSpherical.r = Math.max(10, Math.min(250, targetSpherical.r + e.deltaY * 0.08));
  e.preventDefault();
}, { passive: false });

// Touch
renderer.domElement.addEventListener('touchstart', e => { isDragging = true; lastMouse = {x:e.touches[0].clientX, y:e.touches[0].clientY}; });
renderer.domElement.addEventListener('touchend', () => isDragging = false);
renderer.domElement.addEventListener('touchmove', e => {
  if (isDragging) {
    const dx = e.touches[0].clientX - lastMouse.x;
    const dy = e.touches[0].clientY - lastMouse.y;
    targetSpherical.theta -= dx * 0.006;
    targetSpherical.phi = Math.max(0.15, Math.min(Math.PI/2.1, targetSpherical.phi + dy * 0.006));
    lastMouse = {x:e.touches[0].clientX, y:e.touches[0].clientY};
  }
});

// Hover / info
const raycaster = new THREE.Raycaster();
const mouse2d = new THREE.Vector2();
let hoveredPlanet = null;

function checkHover(e) {
  mouse2d.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse2d.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse2d, camera);
  const hits = raycaster.intersectObjects(planetMeshes);
  const panel = document.getElementById('planet-info');
  if (hits.length > 0) {
    const pd = hits[0].object.userData;
    if (!pd.isMoon) {
      showInfo(pd);
      hoveredPlanet = pd.name;
      document.body.style.cursor = 'pointer';
      return;
    }
  }
  panel.classList.remove('visible');
  hoveredPlanet = null;
  document.body.style.cursor = 'default';
}

function showInfo(pd) {
  document.getElementById('info-name').textContent = pd.name.toUpperCase();
  document.getElementById('info-type').textContent = pd.type;
  document.getElementById('info-diam').textContent = pd.diam;
  document.getElementById('info-orbit').textContent = pd.orbit * 5 + 'M km';
  document.getElementById('info-moons').textContent = pd.moons;
  document.getElementById('info-temp').textContent = pd.temp;
  document.getElementById('info-fact').textContent = pd.fact;
  document.getElementById('planet-info').classList.add('visible');
}

// Controls
document.getElementById('pause-btn').addEventListener('click', () => {
  paused = !paused;
  document.getElementById('pause-btn').textContent = paused ? 'RESUME' : 'PAUSE';
});
document.getElementById('speed-slider').addEventListener('input', e => {
  speedMult = parseFloat(e.target.value);
});
document.getElementById('orbits-btn').addEventListener('click', () => {
  showOrbits = !showOrbits;
  orbitLines.forEach(o => o.visible = showOrbits);
  document.getElementById('orbits-btn').textContent = showOrbits ? 'ORBITS OFF' : 'ORBITS ON';
});

function focusPlanet(name) {
  const mesh = planetMeshes.find(m => m.userData.name === name);
  if (mesh) {
    const pd = mesh.userData;
    targetSpherical.r = pd.orbit * 1.8;
    targetSpherical.phi = Math.PI / 4;
  }
}

// Animation
let time = 0;
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  if (!paused) time += dt * speedMult;

  // Smooth camera
  spherical.theta += (targetSpherical.theta - spherical.theta) * 0.08;
  spherical.phi   += (targetSpherical.phi   - spherical.phi)   * 0.08;
  spherical.r     += (targetSpherical.r     - spherical.r)     * 0.08;
  const sp = spherical;
  camera.position.set(
    sp.r * Math.sin(sp.phi) * Math.sin(sp.theta),
    sp.r * Math.cos(sp.phi),
    sp.r * Math.sin(sp.phi) * Math.cos(sp.theta)
  );
  camera.lookAt(0, 0, 0);

  // Sun rotation
  sun.rotation.y += 0.003;

  // Planet orbits
  planetMeshes.forEach(mesh => {
    const pd = mesh.userData;
    pd.angle += (pd.speed * 0.01) / pd.orbit * time * 0.0 + (pd.speed * 0.004 * (paused ? 0 : speedMult));
    mesh.position.x = Math.cos(pd.angle) * pd.orbit;
    mesh.position.z = Math.sin(pd.angle) * pd.orbit;
    mesh.position.y = Math.sin(pd.angle * 0.3) * 0.3;
    mesh.rotation.y += 0.01 * (paused ? 0 : speedMult);

    // Moons
    mesh.children.forEach(child => {
      if (child.userData.isMoon) {
        const spd = child.userData.speed || 3;
        child.userData.angle += 0.02 * spd * (paused ? 0 : speedMult);
        const r = child.userData.orbitR;
        child.position.x = Math.cos(child.userData.angle) * r;
        child.position.z = Math.sin(child.userData.angle) * r;
        child.position.y = Math.sin(child.userData.angle * 0.5) * 0.3;
      }
    });
  });

  // Asteroids
  if (showAsteroids) {
    asteroids.forEach(a => {
      a.userData.angle += 0.003 * a.userData.speed * (paused ? 0 : speedMult);
      a.position.x = Math.cos(a.userData.angle) * a.userData.orbitR;
      a.position.z = Math.sin(a.userData.angle) * a.userData.orbitR;
      a.position.y = Math.sin(a.userData.angle) * a.userData.tilt * a.userData.orbitR * 0.15;
    });
  }

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
